<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0f1923"/>
<title>TransiTrack v6 — TLC Services</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --night:#0f1923;--night2:#1a2535;--night3:#243044;
  --amber:#f5a623;--amber2:#f97316;
  --red:#ef4444;--blue:#3b9eff;--green:#22c55e;
  --purple:#a78bfa;--teal:#14b8a6;--pink:#ec4899;
  --bg:#f0ede8;--card:#fff;--border:#e2ddd6;
  --text:#0f1923;--muted:#8a8278;
  --r:16px;--shadow:0 4px 20px rgba(15,25,35,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* TOAST */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--night);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;}

/* LOADER */
.loader-ov{position:fixed;inset:0;background:var(--night);z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loader-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-size:36px;}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOCK */
.lock{position:fixed;inset:0;background:var(--night);z-index:997;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;}
.lock-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;}
.lock-role{display:flex;gap:10px;margin-bottom:28px;}
.lock-role-btn{flex:1;padding:12px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.lock-role-btn.on{border-color:var(--amber);background:rgba(245,166,35,.15);color:var(--amber);}
.pin-display{display:flex;gap:12px;margin-bottom:20px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:all .2s;}
.pin-dot.filled{background:var(--amber);border-color:var(--amber);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
.pin-btn{padding:16px;border-radius:14px;border:none;background:rgba(255,255,255,.07);color:#fff;font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:all .15s;}
.pin-btn:active{background:rgba(255,255,255,.15);transform:scale(.95);}
.pin-del{background:rgba(239,68,68,.15);color:var(--red);}
.lock-err{color:var(--red);font-size:13px;font-weight:600;height:20px;text-align:center;margin-bottom:8px;}

/* HEADER */
.hdr{background:var(--night);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;}
.hdr-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.5px;}
.hdr-sub{font-size:9px;opacity:.4;letter-spacing:1.5px;text-transform:uppercase;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.sync-btn{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.6);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;}
.role-pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}

/* SCROLL & NAV */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 95px;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--night);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);border-top:1px solid rgba(255,255,255,.07);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;border:none;background:transparent;color:rgba(255,255,255,.3);font-family:'Outfit',sans-serif;font-size:8.5px;font-weight:600;cursor:pointer;gap:4px;text-transform:uppercase;transition:color .2s;}
.bnav-btn .ico{font-size:18px;line-height:1;}
.bnav-btn.on{color:var(--amber);}

/* TYPO */
.stitle{font-size:20px;font-weight:900;letter-spacing:-1px;margin-bottom:3px;}
.ssub{font-size:12px;color:var(--muted);margin-bottom:16px;}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:12px;}
.cp{padding:16px;}
.sgrid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.sgrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.scard{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px;text-align:center;}
.scard-ico{font-size:20px;margin-bottom:6px;}
.scard-val{font-size:24px;font-weight:900;letter-spacing:-1px;}
.scard-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:2px;}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:13px;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s,transform .15s;}
.btn:active{opacity:.85;transform:scale(.98);}
.btn-night{background:linear-gradient(135deg,var(--night),var(--night2));color:#fff;}
.btn-amber{background:linear-gradient(135deg,var(--amber),var(--amber2));color:#fff;}
.btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;}
.btn-blue{background:linear-gradient(135deg,var(--blue),#1d6dbf);color:#fff;}
.btn-red{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:9px;width:auto;}
.btn-row{display:flex;gap:8px;}

/* FORM */
.fg{margin-bottom:15px;}
.fl{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;}
.fc{width:100%;border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none;}
.fc:focus{border-color:var(--night);}
textarea.fc{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:#666;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;}
.chip.on{background:var(--night);color:#fff;border-color:var(--night);}
.fpills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.fpills::-webkit-scrollbar{display:none;}
.fpill{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:#777;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;transition:all .15s;flex-shrink:0;}
.fpill.on{background:var(--night);color:#fff;border-color:var(--night);}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(15,25,35,.7);display:flex;align-items:flex-end;z-index:500;backdrop-filter:blur(6px);}
.msheet{background:var(--card);border-radius:22px 22px 0 0;padding:22px 16px;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom));animation:sup .3s cubic-bezier(.22,1,.36,1);}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:#e0dbd4;border-radius:2px;margin:0 auto 18px;}
.mtitle{font-size:18px;font-weight:900;letter-spacing:-.5px;margin-bottom:14px;}

/* FAB */
.fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));right:16px;width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--amber),var(--amber2));border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 8px 24px rgba(245,166,35,.45);display:flex;align-items:center;justify-content:center;z-index:150;}
.fab:active{transform:scale(.92);}

.back{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px;font-family:'Outfit',sans-serif;color:var(--text);}
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.dzone{border:1.5px dashed #fca5a5;border-radius:11px;padding:12px;margin-top:14px;}
.fpre{background:var(--bg);border-radius:11px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.8;white-space:pre;overflow-x:auto;border:1px solid var(--border);margin-bottom:14px;}

/* STATUS CHAUFFEUR */
.statut-btn{flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.statut-btn.on-green{background:#dcfce7;border-color:#22c55e;color:#15803d;}
.statut-btn.on-red{background:#fee2e2;border-color:#ef4444;color:#dc2626;}
.statut-btn.on-amber{background:#fef3c7;border-color:#f5a623;color:#92400e;}
.statut-btn.on-blue{background:#dbeafe;border-color:#3b9eff;color:#1d4ed8;}
.statut-btn.on-purple{background:#ede9fe;border-color:#a78bfa;color:#6d28d9;}

/* CHAUFFEUR ROW */
.chauff-row{background:var(--card);border-radius:13px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.chauff-nom{font-weight:700;font-size:14px;}
.chauff-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.statut-row{display:flex;gap:6px;margin-top:10px;}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}

/* PAIE */
.paie-card{background:linear-gradient(135deg,#1e3a5f,var(--night));color:#fff;border-radius:var(--r);padding:18px;margin-bottom:12px;}
.paie-total{font-size:32px;font-weight:900;letter-spacing:-2px;margin:8px 0;}

/* PASSATION */
.pass-card{background:linear-gradient(135deg,var(--night),var(--night2));color:#fff;border-radius:var(--r);padding:18px;margin-bottom:12px;}
.pass-line{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px;}
.pass-ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.pass-text{font-size:12px;opacity:.8;flex:1;line-height:1.4;}

/* EVT */
.evt{background:var(--card);border-radius:13px;border:1px solid var(--border);padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);}
.ebadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.periode-badge{display:inline-flex;align-items:center;gap:5px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:5px;}
.statut-tag{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;white-space:nowrap;}

/* WHATSAPP */
.wa-msg{background:#dcfce7;border-radius:13px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:12px;border:1px solid #bbf7d0;}

/* BILAN */
.bilan-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.bkpi{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:10px 6px;text-align:center;}
.bkpi-val{font-size:20px;font-weight:900;letter-spacing:-1px;}
.bkpi-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px;}
canvas{display:block;max-width:100%;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="loader-ov" id="loaderOv">
  <div class="loader-logo">🚌</div>
  <div style="color:#fff;font-size:20px;font-weight:900;letter-spacing:-1px">TransiTrack</div>
  <div style="color:rgba(255,255,255,.4);font-size:12px" id="loaderMsg">Chargement…</div>
  <div class="spinner"></div>
</div>

<div class="lock" id="lockScreen" style="display:none">
  <div class="lock-logo">🚌</div>
  <div style="color:#fff;font-size:22px;font-weight:900;letter-spacing:-1px;margin-bottom:4px">TransiTrack</div>
  <div style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:28px">TLC Services — Roncq</div>
  <div class="lock-role">
    <button class="lock-role-btn on" id="lr-disp" onclick="selectRole('dispatcher')">🎯 Dispatcher</button>
    <button class="lock-role-btn" id="lr-quai" onclick="selectRole('quai')">🌙 Agent Quai</button>
  </div>
  <div class="pin-display" id="pinDisplay">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="lock-err" id="pinErr"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinInput('1')">1</button><button class="pin-btn" onclick="pinInput('2')">2</button><button class="pin-btn" onclick="pinInput('3')">3</button>
    <button class="pin-btn" onclick="pinInput('4')">4</button><button class="pin-btn" onclick="pinInput('5')">5</button><button class="pin-btn" onclick="pinInput('6')">6</button>
    <button class="pin-btn" onclick="pinInput('7')">7</button><button class="pin-btn" onclick="pinInput('8')">8</button><button class="pin-btn" onclick="pinInput('9')">9</button>
    <button class="pin-btn" onclick="pinInput('0')" style="grid-column:2">0</button>
    <button class="pin-btn pin-del" onclick="pinDel()">⌫</button>
  </div>
  <div style="color:rgba(255,255,255,.2);font-size:10px;margin-top:14px;text-align:center">Dispatcher : 1234 · Agent Quai : 5678</div>
</div>

<header class="hdr" id="mainHdr" style="display:none">
  <div class="hdr-logo">🚌</div>
  <div><div class="hdr-title">TransiTrack</div><div class="hdr-sub">TLC — Roncq</div></div>
  <div class="hdr-right">
    <button class="sync-btn" onclick="syncAll(true)" id="syncBtn">🔄</button>
    <span class="role-pill" id="rolePill" style="background:#fef3c7;color:#92400e"></span>
  </div>
</header>

<div class="scroll" id="app" style="display:none"></div>

<nav class="bnav" id="mainNav" style="display:none">
  <button class="bnav-btn on" id="nb-dash"    onclick="go('dash')">   <span class="ico">📊</span>Accueil</button>
  <button class="bnav-btn"   id="nb-matin"   onclick="go('matin')">  <span class="ico">🌅</span>Matin</button>
  <button class="bnav-btn"   id="nb-tournee" onclick="go('tournee')"><span class="ico">🚛</span>Tournées</button>
  <button class="bnav-btn"   id="nb-rapport" onclick="go('rapport')"><span class="ico">📋</span>Rapport</button>
  <button class="bnav-btn"   id="nb-rh"      onclick="go('rh')">     <span class="ico">👥</span>RH</button>
  <button class="bnav-btn"   id="nb-more"    onclick="go('more')">   <span class="ico">⚙️</span>Plus</button>
</nav>

<script>
const API='https://script.google.com/macros/s/AKfycbytSYhmRdLE7IBC7MI2a21-NrKe4q1TsxzKk85ndDHr0nrWVgUN1rcHQqcbTYxnZlUo/exec';
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const PINS_KEY='tt_pins';
const DEFAULT_PINS={dispatcher:'1234',quai:'5678'};

const ROLES={
  chauffeur:    {label:'Chauffeur',      color:'#22c55e',bg:'#dcfce7',ico:'🚛'},
  chauffeurplus:{label:'Chauffeur+',     color:'#3b9eff',bg:'#dbeafe',ico:'⭐'},
  dispatcher:   {label:'Dispatcher',    color:'#f5a623',bg:'#fef3c7',ico:'🎯'},
  quai_soir:   {label:'Agent Quai Soir',color:'#a78bfa',bg:'#ede9fe',ico:'🌙'},
  quai_samedi: {label:'Agent Samedi',   color:'#14b8a6',bg:'#ccfbf1',ico:'📅'},
};
const CONTRATS={cdi:'CDI',cdd:'CDD',auto:'Auto-entrepreneur'};
const GROUPES={g1:'Groupe 1 — 8h30',g2:'Groupe 2 — 9h15'};
const STATUTS_TOURNEE={
  attente:  {label:'En attente',  color:'#8a8278',bg:'#f3f4f6',ico:'⏳'},
  parti:    {label:'En tournée',  color:'#22c55e',bg:'#dcfce7',ico:'🟢'},
  retour:   {label:'Retour',      color:'#3b9eff',bg:'#dbeafe',ico:'✅'},
  abandon:  {label:'Abandon',     color:'#ef4444',bg:'#fee2e2',ico:'🔴'},
  absence:  {label:'Absent',      color:'#dc2626',bg:'#fee2e2',ico:'❌'},
  demi:     {label:'Demi-tournée',color:'#f5a623',bg:'#fef3c7',ico:'½'},
};
const EVT={
  retard:     {label:'Retard',           color:'#f5a623',bg:'#fef3c7',ico:'⏰',hasPeriode:false},
  absence:    {label:'Absence injust.',  color:'#ef4444',bg:'#fee2e2',ico:'✗', hasPeriode:false},
  repos:      {label:'Repos',           color:'#22c55e',bg:'#dcfce7',ico:'🛌',hasPeriode:true},
  conge:      {label:'Congé annuel',     color:'#3b9eff',bg:'#dbeafe',ico:'🏖',hasPeriode:true},
  maladie:    {label:'Arrêt maladie',    color:'#a78bfa',bg:'#ede9fe',ico:'🏥',hasPeriode:true,hasCertif:true},
  accident:   {label:'Accident travail', color:'#dc2626',bg:'#fee2e2',ico:'⚠', hasPeriode:true,hasCertif:true},
  formation:  {label:'Formation',        color:'#22c55e',bg:'#dcfce7',ico:'📚',hasPeriode:true},
  sanction:   {label:'Sanction',         color:'#6b7280',bg:'#f3f4f6',ico:'📋',hasPeriode:false},
  reclamation:{label:'Réclamation',      color:'#a855f7',bg:'#fdf4ff',ico:'📣',hasPeriode:false},
  demande:    {label:'Demande',          color:'#14b8a6',bg:'#ccfbf1',ico:'📝',hasPeriode:false},
};
const SERVICES=['RH','Direction','Exploitation','Mickael Talaha'];
const STATUTS_EVT=['Justifié','Non justifié','En attente','Approuvé','Refusé'];
const TARIFS={pleine:75,demi:40};

// ══ UTILS ══
function toast(msg,dur=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}
function todayISO(){return new Date().toISOString().split('T')[0];}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('fr-FR');}catch{return s;}}
function initials(n){return(n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}
function diffDays(d1,d2){if(!d1||!d2)return 0;return Math.round((new Date(d2)-new Date(d1))/(1000*60*60*24))+1;}
function fmtEuro(n){return n.toLocaleString('fr-FR',{style:'currency',currency:'EUR'});}

// ══ API ══
async function apiCall(params){
  const url=new URL(API);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,typeof v==='object'?JSON.stringify(v):v));
  const res=await fetch(url.toString());return res.json();
}
async function postAPI(action,body){
  const res=await fetch(`${API}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return res.json();
}
async function syncAll(manual=false){
  if(manual)toast('🔄 Synchronisation…');
  const btn=document.getElementById('syncBtn');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    const data=await apiCall({action:'getAll'});
    if(data.error)throw new Error(data.error);
    S.data={
      members:   data.members    ||[],
      events:    data.events     ||[],
      repos:     arrToObj(data.repos||[]),
      passations:data.passations ||[],
      tournees:  data.tournees   ||[],
      paie:      data.paie       ||[],
    };
    localStorage.setItem('tt_cache',JSON.stringify(S.data));
    localStorage.setItem('tt_cache_ts',Date.now());
    if(manual)toast('✅ À jour !');render();
  }catch(e){toast('⚠ Hors ligne');loadFromCache();}
  finally{if(btn){btn.textContent='🔄';btn.disabled=false;}}
}
function arrToObj(arr){const o={};(arr||[]).forEach(r=>{if(r.key)o[r.key]=true;});return o;}
function objToArr(o){return Object.keys(o||{}).map(k=>({key:k,val:true}));}
async function push(action,data){try{await apiCall({action,data});}catch(e){toast('⚠ Sync échouée');}}
function loadFromCache(){const c=localStorage.getItem('tt_cache');if(c){S.data=JSON.parse(c);render();}else{S.data={members:[],events:[],repos:{},passations:[],tournees:[],paie:[]};render();}}

// ══ AUTH ══
let currentRole='dispatcher',pinBuffer='';
function getPins(){return JSON.parse(localStorage.getItem(PINS_KEY)||JSON.stringify(DEFAULT_PINS));}
function savePins(p){localStorage.setItem(PINS_KEY,JSON.stringify(p));}
function selectRole(r){currentRole=r;pinBuffer='';updateDots();document.getElementById('pinErr').textContent='';document.getElementById('lr-disp').classList.toggle('on',r==='dispatcher');document.getElementById('lr-quai').classList.toggle('on',r==='quai');}
function pinInput(d){if(pinBuffer.length>=4)return;pinBuffer+=d;updateDots();if(pinBuffer.length===4)setTimeout(checkPin,150);}
function pinDel(){pinBuffer=pinBuffer.slice(0,-1);updateDots();}
function updateDots(){for(let i=0;i<4;i++){const el=document.getElementById('pd'+i);if(el)el.classList.toggle('filled',i<pinBuffer.length);}}
function checkPin(){
  const pins=getPins();
  if(pinBuffer===(pins[currentRole]||DEFAULT_PINS[currentRole])){
    ['lockScreen'].forEach(id=>document.getElementById(id).style.display='none');
    ['mainHdr','app','mainNav'].forEach(id=>document.getElementById(id).style.display=id==='app'?'block':id==='mainHdr'?'flex':'flex');
    document.getElementById('rolePill').textContent=currentRole==='dispatcher'?'🎯 Dispatcher':'🌙 Quai';
    render();
  }else{
    document.getElementById('pinErr').textContent='❌ Code incorrect';
    pinBuffer='';updateDots();
    setTimeout(()=>{document.getElementById('pinErr').textContent='';},2000);
  }
}

// ══ STATE ══
let S={
  view:'dash',data:{members:[],events:[],repos:{},passations:[],tournees:[],paie:[]},
  selId:null,filter:'all',search:'',modal:null,mdata:{},editId:null,
  bilanMonth:new Date().getMonth(),bilanYear:new Date().getFullYear(),
  paieMonth:new Date().getMonth(),paieYear:new Date().getFullYear(),
  waType:'planning',
};
function D(){return S.data;}
function getMember(id){return D().members.find(m=>String(m.id)===String(id));}
function getMemberEvts(id){return D().events.filter(e=>String(e.memberId)===String(id));}

// Tournée du jour
function getTourneeJour(memberId,date){return D().tournees.find(t=>String(t.memberId)===String(memberId)&&t.date===date)||null;}
function saveTourneeJour(t){
  const idx=D().tournees.findIndex(x=>String(x.memberId)===String(t.memberId)&&x.date===t.date);
  if(idx>-1)D().tournees[idx]=t; else D().tournees.push(t);
  push('saveTournees',D().tournees);
}

// ══ NAVIGATE ══
function go(view,id){
  S.view=view;if(id!==undefined)S.selId=id;
  S.filter='all';S.search='';
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  const map={dash:'nb-dash',matin:'nb-matin',tournee:'nb-tournee',rh:'nb-rh',paie:'nb-paie',more:'nb-more',member_detail:'nb-rh',bilan:'nb-more',whatsapp:'nb-more',passation:'nb-more'};
  const el=document.getElementById(map[view]||'nb-dash');if(el)el.classList.add('on');
  document.querySelectorAll('.fab').forEach(f=>f.remove());
  render();
}
function fab(fn,ico='+'){const f=document.createElement('button');f.className='fab';f.innerHTML=ico;f.onclick=fn;document.body.appendChild(f);}

// ══ RENDER ══
function render(){
  const app=document.getElementById('app');
  const v=S.view;
  if(v==='dash')         app.innerHTML=rDash();
  else if(v==='matin')   {app.innerHTML=rMatin();if(currentRole==='dispatcher')fab(()=>openModal('add_member'));}
  else if(v==='tournee') app.innerHTML=rTournee();
  else if(v==='rh')      {app.innerHTML=rRH();if(currentRole==='dispatcher')fab(()=>{if(!D().members.length)return;openModal('add_event');});}
  else if(v==='member_detail') app.innerHTML=rMemberDetail();
  else if(v==='paie')    app.innerHTML=rPaie();
  else if(v==='bilan')   {app.innerHTML=rBilan();setTimeout(drawBilanChart,100);}
  else if(v==='whatsapp') app.innerHTML=rWhatsApp();
  else if(v==='passation') {app.innerHTML=rPassation();if(currentRole==='dispatcher')fab(()=>openModal('add_passation'));}
  else if(v==='more')    app.innerHTML=rMore();
  renderModal();
}

  return`

  <div class="ssub">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>

// MEMBER DETAIL
function rMemberDetail(){
  const m=getMember(S.selId);if(!m){go('rh');return'';}
  const r=ROLES[m.role]||ROLES.chauffeur;
  const allEvts=getMemberEvts(m.id);
  const evts=allEvts.filter(e=>S.filter==='all'||e.type===S.filter);
  const today=todayISO();

  // Stats paie du mois
  const tourneesMois=D().tournees.filter(t=>{
    const d=new Date(t.date);
    return String(t.memberId)===String(m.id)&&d.getMonth()===new Date().getMonth()&&d.getFullYear()===new Date().getFullYear();

function rEvtItem(evt,showBtn=false){
  const t=EVT[evt.type]||{label:evt.type,color:'#999',bg:'#f3f4f6',ico:'📌'};
  const hasPeriode=t.hasPeriode&&(evt.dateDebut||evt.dateFin);
  const jours=hasPeriode?diffDays(evt.dateDebut,evt.dateFin):null;
  return`<div class="evt">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div style="flex:1;min-width:0">
        <span class="ebadge" style="background:${t.bg};color:${t.color}">${t.ico} ${t.label}</span>
        ${hasPeriode?`<div class="periode-badge">📅 ${fmtDate(evt.dateDebut)} → ${fmtDate(evt.dateFin)} ${jours?`<span style="background:#bbf7d0;color:#15803d;padding:1px 5px;border-radius:8px;font-size:10px">${jours}j</span>`:''}</div>`:
        `<div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace">📅 ${fmtDate(evt.date)} ${evt.duree?'· '+evt.duree:''}</div>`}
        ${evt.motif?`<div style="font-size:12px;color:#444;margin-top:5px;line-height:1.5">${evt.motif}</div>`:''}
        ${evt.certifUrl?`<a href="${evt.certifUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#eff6ff;color:var(--blue);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;margin-top:6px">📎 Certificat</a>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
        <span class="statut-tag" style="background:${evt.statut==='Non justifié'?'#fee2e2':'#d1fae5'};color:${evt.statut==='Non justifié'?'#dc2626':'#059669'}">${evt.statut}</span>
        ${currentRole==='dispatcher'?`<button class="btn btn-ghost btn-sm" onclick="delEvt('${evt.id}')" style="font-size:10px;padding:3px 8px;color:#ef4444">🗑</button>`:''}
      </div>
    </div>
  </div>`;
}

function rPaie(){
  const members=D().members.filter(m=>['chauffeur','chauffeurplus'].includes(m.role));
  const month=S.paieMonth;const year=S.paieYear;
  const monthLabel=`${MOIS[month]} ${year}`;
  const daysInMonth=new Date(year,month+1,0).getDate();

  // Calcul pour chaque chauffeur
  const paies=members.map(m=>{
    let pleines=0,demis=0;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const t=getTourneeJour(m.id,ds);
      if(t?.statut==='parti'||t?.statut==='retour') pleines++;
      else if(t?.statut==='demi') demis++;
    }
    const total=pleines*TARIFS.pleine+demis*TARIFS.demi;
    return{m,pleines,demis,total};
  }).sort((a,b)=>b.total-a.total);

  const totalGeneral=paies.reduce((s,p)=>s+p.total,0);
  const monthOpts=MOIS.map((m,i)=>`<option value="${i}" ${i===month?'selected':''}>${m}</option>`).join('');
  const yearOpts=[2024,2025,2026].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('');

  return`
  <div class="stitle">💰 Paie mensuelle</div>
  <div class="ssub">75€ tournée · 40€ demi-tournée</div>

  <div style="display:flex;gap:8px;margin-bottom:14px">
    <select class="fc" onchange="S.paieMonth=parseInt(this.value);render()">${monthOpts}</select>
    <select class="fc" style="width:100px" onchange="S.paieYear=parseInt(this.value);render()">${yearOpts}</select>
  </div>

  <!-- Total général -->
  <div class="paie-card">
    <div style="font-size:12px;opacity:.5">Masse salariale — ${monthLabel}</div>
    <div class="paie-total">${fmtEuro(totalGeneral)}</div>
    <div style="font-size:12px;opacity:.6">${members.length} chauffeur(s) · ${paies.reduce((s,p)=>s+p.pleines,0)} tournée(s) + ${paies.reduce((s,p)=>s+p.demis,0)} demi(s)</div>
  </div>

  <!-- Par chauffeur -->
  ${paies.map(({m,pleines,demis,total})=>{
    const r=ROLES[m.role]||ROLES.chauffeur;
    const pct=totalGeneral?Math.round(total/totalGeneral*100):0;
    return`<div class="card cp" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:${r.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">${initials(m.nom)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">${m.nom}</div>
          <div style="font-size:11px;color:var(--muted)">${CONTRATS[m.contrat]||'—'} · ${m.matricule||'—'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:900;color:var(--green)">${fmtEuro(total)}</div>
          <div style="font-size:10px;color:var(--muted)">${pct}% du total</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;font-size:12px">
        <span style="background:#dcfce7;color:#15803d;padding:3px 9px;border-radius:20px;font-weight:600">🚛 ${pleines} tournée(s)</span>
        ${demis?`<span style="background:#fef3c7;color:#92400e;padding:3px 9px;border-radius:20px;font-weight:600">½ ${demis} demi(s)</span>`:''}
        ${!pleines&&!demis?`<span style="background:#f3f4f6;color:#6b7280;padding:3px 9px;border-radius:20px;font-weight:600">Aucune tournée</span>`:''}
      </div>
      <div style="height:6px;background:#f0ede8;border-radius:3px;overflow:hidden;margin-top:10px">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--green),#16a34a);border-radius:3px"></div>
      </div>
      ${currentRole==='dispatcher'?`<div class="btn-row" style="margin-top:10px">
        <button class="btn btn-ghost btn-sm" onclick="genFichePaie('${m.id}','${month}','${year}')" style="flex:1">📄 Fiche PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="genFacture('${m.id}','${month}','${year}')" style="flex:1;display:${m.contrat==='auto'?'flex':'none'}">📋 Facture</button>
      </div>`:''}
    </div>`;}).join('')}

  ${currentRole==='dispatcher'?`<button class="btn btn-night" onclick="exportPaiePDF()">📄 Exporter tout en PDF</button>`:''}`;
}

window.genFichePaie=function(memberId,month,year){
  const m=getMember(memberId);if(!m)return;
  const{jsPDF}=window.jspdf;if(!jsPDF){toast('PDF non disponible');return;}
  const monthLabel=`${MOIS[month]} ${year}`;
  const daysInMonth=new Date(year,parseInt(month)+1,0).getDate();
  let pleines=0,demis=0,details=[];
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(parseInt(month)+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const t=getTourneeJour(m.id,ds);
    if(t?.statut==='parti'||t?.statut==='retour'){pleines++;details.push({date:fmtDate(ds),type:'Tournée complète',montant:TARIFS.pleine});}
    else if(t?.statut==='demi'){demis++;details.push({date:fmtDate(ds),type:'Demi-tournée',montant:TARIFS.demi});}
  }
  const total=pleines*TARIFS.pleine+demis*TARIFS.demi;
  const doc=new jsPDF();
  let y=20;
  doc.setFillColor(15,25,35);doc.rect(0,0,210,30,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text('TransiTrack — TLC Services',14,12);
  doc.setFontSize(10);doc.text('Fiche de paie — '+monthLabel,14,22);
  y=42;doc.setTextColor(15,25,35);
  doc.setFontSize(13);doc.text(`${m.nom}`,14,y);y+=7;
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(`Rôle : ${ROLES[m.role]?.label||'—'} · Contrat : ${CONTRATS[m.contrat]||'—'} · Matricule : ${m.matricule||'—'}`,14,y);y+=12;
  doc.setDrawColor(200,200,200);doc.line(14,y,196,y);y+=8;
  details.forEach((d,i)=>{
    if(i%2===0){doc.setFillColor(248,247,245);doc.rect(14,y-4,182,8,'F');}
    doc.text(d.date,16,y);doc.text(d.type,60,y);
    doc.setFont('helvetica','bold');doc.text(d.montant+'€',180,y,'right');
    doc.setFont('helvetica','normal');y+=8;
  });
  y+=4;doc.line(14,y,196,y);y+=8;
  doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text('TOTAL',14,y);doc.text(total+'€',180,y,'right');
  doc.setFontSize(8);doc.setTextColor(150,150,150);doc.setFont('helvetica','normal');
  doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')} — TransiTrack TLC Services`,14,285);
  doc.save(`Paie_${m.nom.replace(' ','_')}_${monthLabel}.pdf`);
  toast('✅ Fiche PDF générée !');
};

function genWAMessage(type){
  const today=new Date();
  const dateStr=today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const members=D().members.filter(m=>['chauffeur','chauffeurplus'].includes(m.role));
  const tournees=D().tournees.filter(t=>t.date===todayISO());

  if(type==='planning'){
    const g1=members.filter(m=>m.groupe==='g1'||!m.groupe);
    const g2=members.filter(m=>m.groupe==='g2');
    return`🚌 *PLANNING DU JOUR — ${dateStr.toUpperCase()}*
TLC Services — Agence de Roncq

🕗 *GROUPE 1 — 8h30*
${g1.map(m=>'• '+m.nom).join('\n')||'Aucun chauffeur'}

🕘 *GROUPE 2 — 9h15*
${g2.map(m=>'• '+m.nom).join('\n')||'Aucun chauffeur'}

📦 Vérifiez vos sacs avant départ
✅ EPI obligatoires
📱 Restez joignables pendant la tournée

— Dispatcher TLC Roncq`;
  }

  if(type==='depart'){
    const partis=tournees.filter(t=>t.statut==='parti'||t.statut==='retour');
    const absents=tournees.filter(t=>t.statut==='absence');
    return`🚛 *DÉPARTS — ${dateStr.toUpperCase()}*

✅ *Partis (${partis.length})*
${partis.map(t=>{const m=getMember(t.memberId);return m?'• '+m.nom:''}).filter(Boolean).join('\n')||'Aucun départ enregistré'}

${absents.length?`❌ *Absents (${absents.length})*\n${absents.map(t=>{const m=getMember(t.memberId);return m?'• '+m.nom:''}).filter(Boolean).join('\n')}`:''}

Bonne tournée à tous 💪
— Dispatcher TLC Roncq`;
  }

  if(type==='rappel'){
    return`🔔 *RAPPEL IMPORTANT*
TLC Services — ${dateStr}

📋 Points à vérifier :
• EPI obligatoires (gilet, chaussures)
• Sacs correctement triés avant départ
• Application Vinted Go activée
• Téléphone chargé et joignable
• En cas de problème → appeler le dispatcher

Merci à tous 🙏
— Dispatcher TLC Roncq`;
  }

  if(type==='incident'){
    const incidents=tournees.filter(t=>t.incident||t.sacsOublies);
    return`🚨 *ALERTE INCIDENT — ${dateStr.toUpperCase()}*
TLC Services Roncq

${incidents.length?incidents.map(t=>{const m=getMember(t.memberId);return`⚠ ${m?m.nom:'?'} : ${t.incident||''} ${t.sacsOublies?'— Sac oublié: '+t.sacsOublies:''}`;}).join('\n'):'Aucun incident enregistré'}

    const retours=tournees.filter(t=>t.statut==='retour').length;

    const sacsOublies=tournees.filter(t=>t.sacsOublies).length;
    return`📊 *BILAN DE JOURNÉE — ${dateStr.toUpperCase()}*
TLC Services — Agence de Roncq

window.rmToggle2=function(prefix,a,b){
  const ea=document.getElementById('rm-'+prefix+'-'+a);
  const eb=document.getElementById('rm-'+prefix+'-'+b);
  if(!ea||!eb)return;
  const aActive=ea.style.borderColor==='rgb(34, 197, 94)'||ea.style.borderColor==='rgb(239, 68, 68)';
  const isOkA=a==='oui'||a==='ok';
  const isErrA=a==='non'||a==='abs'||a==='pb';
  if(aActive){
    ea.style.cssText+=';border-color:var(--border)!important;background:var(--bg)!important;color:#666!important';
  } else {
    if(isOkA){ea.style.borderColor='#22c55e';ea.style.background='#dcfce7';ea.style.color='#15803d';}
    else{ea.style.borderColor='#ef4444';ea.style.background='#fee2e2';ea.style.color='#dc2626';}
    eb.style.borderColor='var(--border)';eb.style.background='var(--bg)';eb.style.color='#666';
  }
};
window.rmToggleChip=function(id,type){
  const el=document.getElementById(id);if(!el)return;
  const isActive=el.style.borderColor==='rgb(34, 197, 94)'||el.style.borderColor==='rgb(239, 68, 68)'||el.style.borderColor==='rgb(245, 166, 35)';
  if(isActive){el.style.borderColor='var(--border)';el.style.background='var(--bg)';el.style.color='#666';}
  else{
    if(type==='ok'){el.style.borderColor='#22c55e';el.style.background='#dcfce7';el.style.color='#15803d';}
    else if(type==='warn'){el.style.borderColor='#f5a623';el.style.background='#fef3c7';el.style.color='#92400e';}
    else{el.style.borderColor='#ef4444';el.style.background='#fee2e2';el.style.color='#dc2626';}
  }
};

function rmIsActive(id){
  const el=document.getElementById(id);if(!el)return false;
  return el.style.borderColor==='rgb(34, 197, 94)'||el.style.borderColor==='rgb(239, 68, 68)'||el.style.borderColor==='rgb(245, 166, 35)';
}
function rmIsOk(id){const el=document.getElementById(id);return el&&el.style.borderColor==='rgb(34, 197, 94)';}
function rmIsErr(id){const el=document.getElementById(id);return el&&el.style.borderColor==='rgb(239, 68, 68)';}

function rmItem(type,text){
  const cfg={ok:{bg:'#dcfce7',color:'#15803d',ico:'✓'},warn:{bg:'#fef3c7',color:'#92400e',ico:'⚠'},err:{bg:'#fee2e2',color:'#dc2626',ico:'✗'},arrow:{bg:'#ffedd5',color:'#c2410c',ico:'→'}};
  const c=cfg[type]||cfg.ok;
  return`<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:8px;font-size:12px;line-height:1.4">
    <div style="width:18px;height:18px;border-radius:50%;background:${c.bg};color:${c.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px">${c.ico}</div>
    <div>${text}</div>
  </div>`;
}

function drawBilanChart(){
  const canvas=document.getElementById('bilanChart');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.parentElement.offsetWidth-32;
  const month=S.bilanMonth;const year=S.bilanYear;
  const evts=D().events.filter(e=>{const d=new Date(e.dateDebut||e.date||'');return d.getMonth()===month&&d.getFullYear()===year;});
  const keys=['retard','absence','maladie','conge','repos','accident'];
  const vals=keys.map(k=>evts.filter(e=>e.type===k).length);
  const colors=keys.map(k=>EVT[k].color);
  const labels=keys.map(k=>EVT[k].ico+' '+EVT[k].label.slice(0,7));
  const max=Math.max(...vals,1);
  const W=canvas.width;const H=canvas.height=160;
  const pad=36;const barW=(W-pad*2)/keys.length*0.55;const gap=(W-pad*2)/keys.length;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=16+(H-36)*i/4;ctx.strokeStyle='#e2ddd6';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-8,y);ctx.stroke();
    ctx.fillStyle='#8a8278';ctx.font='9px Outfit';ctx.textAlign='right';
    ctx.fillText(Math.round(max*(4-i)/4),pad-3,y+3);
  }
  vals.forEach((v,i)=>{
    const x=pad+i*gap+(gap-barW)/2;const bH=v?(H-36)*v/max:0;const y=H-20-bH;
    ctx.fillStyle=colors[i]+'22';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,16,barW,H-36,3);else ctx.rect(x,16,barW,H-36);ctx.fill();
    ctx.fillStyle=colors[i];ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,barW,bH,3);else ctx.rect(x,y,barW,bH);ctx.fill();
    if(v>0){ctx.fillStyle=colors[i];ctx.font='bold 11px Outfit';ctx.textAlign='center';ctx.fillText(v,x+barW/2,y-3);}
    ctx.fillStyle='#8a8278';ctx.font='8px Outfit';ctx.textAlign='center';ctx.fillText(labels[i],x+barW/2,H-4);
  });
}

  y+=4;doc.setDrawColor(200,200,200);doc.line(14,y,196,y);y+=8;
  doc.setFont('helvetica','bold');doc.text('TOTAL',14,y);doc.text(`${totalT}T+${totalD}D`,110,y);doc.text(fmtEuro(totalMasse),180,y,'right');
  doc.setFontSize(8);doc.setTextColor(150,150,150);doc.setFont('helvetica','normal');
  doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')} — TransiTrack`,14,285);
  doc.save(`Bilan_${monthLabel}.pdf`);toast('✅ PDF généré !');
};

window.envoyerRapportMickael=async function(){
  const month=S.bilanMonth;const year=S.bilanYear;const monthLabel=`${MOIS[month]} ${year}`;
  const members=D().members.filter(m=>['chauffeur','chauffeurplus'].includes(m.role));
  const evts=D().events.filter(e=>{const d=new Date(e.dateDebut||e.date||'');return d.getMonth()===month&&d.getFullYear()===year;});
  const daysInMonth=new Date(year,month+1,0).getDate();
  let lignes='';let totalT=0,totalD=0,totalMasse=0;
  members.forEach(m=>{
    let p=0,d=0;
    for(let day=1;day<=daysInMonth;day++){
      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const t=getTourneeJour(m.id,ds);
      if(t?.statut==='parti'||t?.statut==='retour')p++;else if(t?.statut==='demi')d++;
    }
    totalT+=p;totalD+=d;const tot=p*75+d*40;totalMasse+=tot;
    lignes+=`${m.nom}: ${p} tournées + ${d} demis = ${fmtEuro(tot)}\n`;
  });
  toast('📧 Envoi du rapport…');
  try{
    const res=await postAPI('notifyEvent',{
      type:'rapport_mensuel',memberNom:'Rapport Mensuel '+monthLabel,memberRole:'Dispatcher',
      matricule:'—',dateDebut:monthLabel,dateFin:monthLabel,
      motif:`Bilan ${monthLabel}\n\n${lignes}\nMasse salariale : ${fmtEuro(totalMasse)}\nTotal tournées : ${totalT} + ${totalD} demis\nÉvénements RH : ${evts.length}`,
      statut:'Information',note:'',certifUrl:'',
      services:['Mickael Talaha'],
    });
    if(res.ok) toast('✅ Rapport envoyé à Mickael !');
    else toast('⚠ Erreur: '+(res.error||'inconnue'));
  }catch(e){toast('⚠ Envoi échoué');}
};

}

function pickEvtType(t){
  document.getElementById('ev-type').value=t;
  document.querySelectorAll('#ev-type-g .chip').forEach(c=>c.classList.toggle('on',c.dataset.t===t));
  const hp=EVT[t]?.hasPeriode;const hc=EVT[t]?.hasCertif;
  document.getElementById('ev-periode-block').style.display=hp?'block':'none';
  document.getElementById('ev-date-block').style.display=hp?'none':'block';
  document.getElementById('ev-certif-block').style.display=hc?'block':'none';
  updateDureeCalc();
}
window.updateDureeCalc=function(){
  const d=document.getElementById('ev-debut');const f=document.getElementById('ev-fin');
  const calc=document.getElementById('ev-duree-calc');const txt=document.getElementById('ev-duree-txt');
  if(!d||!f)return;if(d.value&&f.value){const j=diffDays(d.value,f.value);if(j>0){calc.style.display='block';txt.textContent=`${j} jour${j>1?'s':''}`;return;}}calc.style.display='none';
};

let pendingCertif=null;
window.onCertSelected=function(input){
  const file=input.files[0];if(!file)return;pendingCertif=file;
  const zone=document.getElementById('certZone');
  zone.style.borderColor='#22c55e';zone.style.background='#f0fdf4';
  zone.innerHTML=`<div style="font-size:26px;margin-bottom:5px">${file.type.includes('image')?'🖼':'📄'}</div><div style="font-weight:700;font-size:12px;color:#15803d">${file.name}</div><div style="font-size:11px;color:#16a34a;margin-top:3px">${(file.size/1024/1024).toFixed(2)} MB</div>`;
};

async function saveEvt(){
  const memberId=document.getElementById('ev-m').value;const type=document.getElementById('ev-type').value;
  const statut=document.getElementById('ev-stat').value;const motif=document.getElementById('ev-mot').value.trim();
  const services=[...document.querySelectorAll('#ev-svc-g .chip.on')].map(c=>c.dataset.svc);
  const hasPeriode=EVT[type]?.hasPeriode;
  let evtData={id:Date.now(),memberId,type,statut,motif,services};
  if(hasPeriode){
    const debut=document.getElementById('ev-debut').value;const fin=document.getElementById('ev-fin').value;
    if(!debut||!fin){alert('Dates obligatoires.');return;}if(fin<debut){alert('Date fin < date début.');return;}
    evtData.dateDebut=debut;evtData.dateFin=fin;evtData.duree=diffDays(debut,fin)+' j';
  }else{
    const date=document.getElementById('ev-date').value;if(!date){alert('Date obligatoire.');return;}
    evtData.date=date;evtData.duree=document.getElementById('ev-dur').value.trim();
  }
  D().events.push(evtData);closeModal();render();toast('💾 Enregistrement…');
  await push('saveEvents',D().events);
  if(services.length){
    try{
      const m=getMember(memberId);const r=m?ROLES[m.role]:null;
      await postAPI('notifyEvent',{type,memberNom:m?m.nom:'—',memberRole:r?r.label:'—',matricule:m?m.matricule||'—':'—',dateDebut:evtData.dateDebut||evtData.date||'—',dateFin:evtData.dateFin||'',motif:motif||'—',statut,note:'',certifUrl:'',services});
      toast(`📧 Notification envoyée`);
    }catch(e){toast('⚠ Email non envoyé');}
  }else{toast('✅ Événement sauvegardé');}
  if(pendingCertif&&EVT[type]?.hasCertif){
    toast('📤 Upload certificat…');
    try{
      const m=getMember(memberId);
      const reader=new FileReader();
      reader.onload=async function(e){
        const base64=e.target.result.split(',')[1];
        const res=await postAPI('uploadCertificat',{fileData:base64,fileName:pendingCertif.name,mimeType:pendingCertif.type,evtId:String(evtData.id),memberNom:m?m.nom:'inconnu'});
        if(res.ok){
          const idx=D().events.findIndex(e=>String(e.id)===String(evtData.id));
          if(idx>-1){D().events[idx].certifUrl=res.viewUrl;}
          await push('saveEvents',D().events);toast('✅ Certificat uploadé !');pendingCertif=null;render();
        }else{toast('⚠ Upload: '+(res.error||'erreur'));}
      };
      reader.readAsDataURL(pendingCertif);
    }catch(err){toast('⚠ Upload échoué');}
  }
}

// MODAL PASSATION
function mAddPassation(){
  const today=todayISO();const isVen=new Date().getDay()===5;
  const tournees=D().tournees.filter(t=>t.date===today);
  const sacsRelivraison=tournees.filter(t=>t.sacsOublies&&t.sacAction==='relivraison').map(t=>{const m=getMember(t.memberId);return m?m.nom+': '+t.sacsOublies:'';}).filter(Boolean).join('\n');
  const incidents=tournees.filter(t=>t.incident).map(t=>{const m=getMember(t.memberId);return m?m.nom+': '+t.incident:'';}).filter(Boolean).join('\n');
  const partis=tournees.filter(t=>t.statut==='parti'||t.statut==='retour'||t.statut==='demi').length;
  const total=D().members.filter(m=>['chauffeur','chauffeurplus'].includes(m.role)).length;
  return`<div class="msheet"><div class="mhandle"></div>
  <div class="mtitle">🔁 Fiche de passation</div>
  <div class="fg"><label class="fl">Date *</label><input class="fc" id="p-date" type="date" value="${today}"/></div>
  <div class="fg"><label class="fl">✅ Situation des départs</label><textarea class="fc" id="p-dep" placeholder="Départs OK…">${partis}/${total} chauffeurs partis</textarea></div>
  <div class="fg"><label class="fl">⚠ Incidents du jour</label><textarea class="fc" id="p-inc" placeholder="Incidents…">${incidents}</textarea></div>
  <div class="fg"><label class="fl">📦 Sacs relivraison J+1</label><textarea class="fc" id="p-sacs" placeholder="Sacs à relivrer demain…">${sacsRelivraison}</textarea></div>
  <div class="fg"><label class="fl">👁 À surveiller au retour</label><textarea class="fc" id="p-surv" placeholder="Points d'attention…"></textarea></div>
  <div class="fg"><label class="fl">📞 Consignes pour Matis</label><input class="fc" id="p-cons" placeholder="Si problème : appeler dispatcher…"/></div>
  ${isVen?`<div class="fg" style="background:#fef3c7;border-radius:11px;padding:12px;border:1px solid #f5a623">
    <label class="fl" style="color:#92400e">📅 Consignes samedi (Riad)</label>
    <textarea class="fc" id="p-sam"></textarea><input type="hidden" id="p-issam" value="1"/>
  </div>`:`<input type="hidden" id="p-issam" value="0"/>`}
  <button class="btn btn-amber" onclick="savePassation()">✓ Enregistrer</button></div>`;
}
async function savePassation(){
  const date=document.getElementById('p-date').value;if(!date){alert('Date obligatoire.');return;}
  const issamEl=document.getElementById('p-issam');
  D().passations.push({id:Date.now(),date,departs:document.getElementById('p-dep').value.trim(),incident:document.getElementById('p-inc').value.trim(),sacsRelivraison:document.getElementById('p-sacs').value.trim(),surveiller:document.getElementById('p-surv').value.trim(),consigne:document.getElementById('p-cons').value.trim(),estSamedi:issamEl&&issamEl.value==='1',samedi:document.getElementById('p-sam')?document.getElementById('p-sam').value.trim():''});
  closeModal();go('passation');toast('💾 Sauvegarde…');await push('savePassations',D().passations);toast('✅ Passation sauvegardée');
}

// DELETE
async function delMember(id){if(!confirm('Supprimer ?'))return;S.data.members=S.data.members.filter(m=>String(m.id)!==String(id));S.data.events=S.data.events.filter(e=>String(e.memberId)!==String(id));go('rh');await push('saveMembers',D().members);await push('saveEvents',D().events);toast('✅ Supprimé');}
async function delEvt(id){if(!confirm('Supprimer ?'))return;S.data.events=S.data.events.filter(e=>String(e.id)!==String(id));render();await push('saveEvents',D().events);toast('✅ Supprimé');}
async function delPass(id){if(!confirm('Supprimer ?'))return;S.data.passations=S.data.passations.filter(p=>String(p.id)!==String(id));render();await push('savePassations',D().passations);toast('✅ Supprimé');}

    document.getElementById('loaderMsg').textContent='Connexion à Google Sheets…';
    const data=await apiCall({action:'getAll'});
    if(data.error)throw new Error(data.error);
    S.data={members:data.members||[],events:data.events||[],repos:arrToObj(data.repos||[]),passations:data.passations||[],tournees:data.tournees||[],paie:data.paie||[]};
    localStorage.setItem('tt_cache',JSON.stringify(S.data));
    localStorage.setItem('tt_cache_ts',Date.now());
  }catch(e){
    document.getElementById('loaderMsg').textContent='Hors ligne — données locales';
    await new Promise(r=>setTimeout(r,800));loadFromCache();
  }finally{
    document.getElementById('loaderOv').style.display='none';
    document.getElementById('lockScreen').style.display='flex';
  }
})();
